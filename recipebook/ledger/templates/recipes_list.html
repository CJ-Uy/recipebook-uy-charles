{% extends 'base.html' %} {% block style %}
<style>
  table,
  td,
  th {
    border: 1px solid;
  }

  table {
    border-collapse: collapse;
  }
</style>
{% endblock %} {% block body %}
<h1>RECIPES LIST</h1>

{% for recipe in recipes %}
<div style="margin-bottom: 30px">
  <h2><a href="{{ recipe.get_absolute_url }}"> {{ recipe.name }} </a></h2>
</div>
{% endfor %} {% endblock %}
